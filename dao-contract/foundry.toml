[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# Polkadot Hub testnet
[rpc_endpoints]
polkadot_hub_testnet = "${POLKADOT_HUB_RPC_URL}"
polkadot_hub_mainnet = "${POLKADOT_HUB_MAINNET_RPC_URL}"

[etherscan]
polkadot_hub_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${POLKADOT_HUB_EXPLORER_URL}" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 1000
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15
